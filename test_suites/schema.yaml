# JSON Schema for LLM Eval Framework test suite YAML files
# Expressed in YAML for readability; structurally equivalent to JSON Schema Draft 2020-12.

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "LLM Eval Test Suite"
description: "Schema for test suite YAML files consumed by llm-eval-framework"
type: object

required:
  - name
  - test_cases

properties:
  name:
    type: string
    minLength: 1
    description: "Human-readable suite name"

  description:
    type: string
    description: "Optional description of what this suite evaluates"

  version:
    type: string
    pattern: "^\\d+\\.\\d+$"
    description: "Semantic version of the suite definition"

  tags:
    type: array
    items:
      type: string
    description: "Tags for filtering suites"

  test_cases:
    type: array
    minItems: 1
    description: "List of individual test cases"
    items:
      type: object
      required:
        - id
        - question
        - expected_answer
      properties:
        id:
          type: string
          minLength: 1
          description: "Unique identifier for this test case"

        question:
          type: string
          minLength: 1
          description: "The prompt / question to send to the LLM"

        expected_answer:
          type: string
          minLength: 1
          description: "The ground-truth or reference answer"

        context:
          type: string
          description: "Optional retrieval context (for RAG evaluation)"

        tags:
          type: array
          items:
            type: string
          description: "Tags for filtering individual test cases"

        metadata:
          type: object
          additionalProperties: true
          description: "Arbitrary key-value metadata for the test case"

      additionalProperties: false

additionalProperties: false
